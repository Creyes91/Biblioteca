<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alta de Plataforma</title>
    <link rel="stylesheet" href="/plataforma.css">
</head>
<body>

<div class="form-container">
    <h2>Registrar Nueva Plataforma</h2>
    <p class="subtitle">Introduce los datos para dar de alta la plataforma en el sistema.</p>

    <!-- Cambia el action por la ruta de tu controlador de Spring (ej. /plataformas/guardar) -->
    <form action="/plataformas" method="POST">

        <div class="form-group">
            <label for="fabricante">Fabricante / Empresa</label>
            <input type="text" id="fabricante" name="fabricante" placeholder="Ej. Sony, Nintendo, Microsoft" required>
        </div>

        <div class="form-group">
            <label for="nombre">Nombre de la Plataforma</label>
            <input type="text" id="nombre" name="nombre" placeholder="Ej. PlayStation 5, Switch" required>
        </div>

        <div class="form-group">
            <label for="anyo">Año de Lanzamiento</label>
            <input type="number" id="anyo" name="anyo" min="1950" max="2100" placeholder="Ej. 2020" required>
        </div>

        <button type="submit" class="btn-submit">Guardar Plataforma</button>
    </form>
</div>

</body>
</html>
