<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo}">Gestión de Datos - Biblioteca de Videojuegos</title>
    <link rel="stylesheet" th:href="@{/index-style.css}">
</head>
<body>

<!-- Cabecera Principal -->
<header class="header-main">
    <div class="header-container">
        <div class="brand-logo">
            <svg viewBox="0 0 100 80" class="logo-svg">
                <path d="M10 20 Q 35 15, 50 25 Q 65 15, 90 20 L 90 70 Q 65 65, 50 75 Q 35 65, 10 70 Z" fill="none" stroke="#d4af37" stroke-width="4"/>
                <line x1="50" y1="25" x2="50" y2="75" stroke="#d4af37" stroke-width="4"/>
                <path d="M25 45 H 35 M 30 40 V 50" stroke="#d4af37" stroke-width="3" stroke-linecap="round"/>
                <circle cx="65" cy="42" r="3" fill="#d4af37"/>
                <circle cx="73" cy="48" r="3" fill="#d4af37"/>
            </svg>
            <div class="logo-text">
                <span class="logo-title">LIBRO & JUEGO</span>
                <span class="logo-sub">BIBLIOTECA</span>
            </div>
        </div>
        <h1 class="app-title">BIBLIOTECA DE VIDEOJUEGOS</h1>
    </div>
</header>

<!-- Barra de Navegación de Retorno -->
<nav class="top-nav">
    <div class="nav-buttons">
        <a th:href="@{/}" class="nav-btn">VOLVER AL PANEL PRINCIPAL</a>
    </div>
</nav>

<!-- Contenedor del Formulario Genérico -->
<main class="content-container flex-center">

    <section class="card form-card">
        <div class="card-header">
            <div class="card-icon">
                <svg viewBox="0 0 24 24" width="40" height="40" fill="#1d3557">
                    <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
                </svg>
            </div>
            <h3 th:text="${titulo}">Registrar Nuevo Elemento</h3>
        </div>

        <!-- Formulario Genérico -->
        <form th:action="@{${action}}" method="POST" class="card-body">

            <!-- Campo oculto para el ID si estamos editando -->
            <input type="hidden" name="id" th:value="${id}" />

            <!-- Iteración dinámica sobre los campos recibidos -->
            <div th:each="campo : ${campos}" class="form-group">
                <label th:for="${campo.nombreCampo}" th:text="${campo.label}"></label>
                <input th:type="${campo.tipo}"
                       th:name="${campo.nombreCampo}"
                       th:id="${campo.nombreCampo}"
                       th:value="${campo.valor}"
                       th:placeholder="${'Ej. ' + campo.valor}"
                       required>
            </div>

            <button type="submit" class="action-btn btn-submit">GUARDAR REGISTRO</button>
        </form>
    </section>

</main>

<!-- Pie de página -->
<footer class="footer-links">
    <div class="links">
        <a href="#">Acerca de</a>
        <a href="#">Contacto</a>
    </div>
    <p>&copy; 2026 Biblioteca de Videojuegos</p>
</footer>

</body>
</html>
