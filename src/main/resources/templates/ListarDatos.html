<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${titulo}">Listado - Biblioteca de Videojuegos</title>
  <link rel="stylesheet" th:href="@{/index-style.css}">
</head>
<body>

<header class="header-main">
  <div class="header-container">
    <div class="brand-logo">
      <svg viewBox="0 0 100 80" class="logo-svg">
        <path d="M10 20 Q 35 15, 50 25 Q 65 15, 90 20 L 90 70 Q 65 65, 50 75 Q 35 65, 10 70 Z" fill="none" stroke="#d4af37" stroke-width="4"/>
        <line x1="50" y1="25" x2="50" y2="75" stroke="#d4af37" stroke-width="4"/>
        <path d="M25 45 H 35 M 30 40 V 50" stroke="#d4af37" stroke-width="3" stroke-linecap="round"/>
        <circle cx="65" cy="42" r="3" fill="#d4af37"/>
        <circle cx="73" cy="48" r="3" fill="#d4af37"/>
      </svg>
      <div class="logo-text">
        <span class="logo-title">LIBRO & JUEGO</span>
        <span class="logo-sub">BIBLIOTECA</span>
      </div>
    </div>
    <h1 class="app-title">BIBLIOTECA DE VIDEOJUEGOS</h1>
  </div>
</header>

<nav class="top-nav">
  <div class="nav-buttons">
    <a th:href="@{/}" class="nav-btn">VOLVER AL PANEL PRINCIPAL</a>
    <a th:href="@{${rutaNueva}}" class="nav-btn">AÑADIR NUEVO ELEMENTO</a>
  </div>
</nav>

<main class="content-container">
  <section class="card">
    <div class="card-header">
      <div class="card-icon">
        <svg viewBox="0 0 24 24" width="40" height="40" fill="#1d3557">
          <path d="M4 6h16v2H4zm0 5h16v2H4zm0 5h16v2H4z"/>
        </svg>
      </div>
      <h3 th:text="${h3}">Elementos Registrados</h3>
    </div>

    <div class="table-container">
      <table class="custom-table">
        <thead>
        <tr>
          <!-- Cabeceras dinámicas -->
          <th th:each="col : ${columnas}" th:text="${col}"></th>
          <th style="text-align: center; width: 220px;">Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="fila : ${filas}">
          <!-- Celdas dinámicas -->
          <td th:each="celda : ${fila.celdas}" >
            <!-- Contenedor fantasma para la lógica -->

            <div th:if="${celda != null and celda.toString().startsWith('http')}">
              <img th:src="${celda}" style="width: 60px; height: 60px; border: 1px solid black;">
            </div>

            <!-- 3. Pon otro bloque para el texto, solo si NO empieza por http -->
            <div th:unless="${celda != null and celda.toString().startsWith('http')}">
              <span th:text="${celda}"></span>
            </div>
          </td>
          <td style="text-align: center;">
            <div class="actions-wrapper">
              <a th:if="${rutaPdf != null}" th:href="@{${rutaPdf}(id=${fila.id})}" class="btn-table btn-pdf" title="Descargar PDF">PDF</a>
              <a th:href="@{${rutaEditar}(id=${fila.id})}" class="btn-table btn-edit">✏️</a>
              <a th:href="@{${rutaEliminar}(id=${fila.id})}" class="btn-table btn-delete" onclick="return confirm('¿Seguro?')">🗑️</a>
            </div>
          </td>
        </tr>
        </tbody>
      </table>
    </div>
  </section>
</main>

<footer class="footer-links">
  <div class="links">
    <a href="#">Acerca de</a>
    <a href="#">Contacto</a>
  </div>
  <p>&copy; 2026 Biblioteca de Videojuegos</p>
</footer>

</body>
</html>
